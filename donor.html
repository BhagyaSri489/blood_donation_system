<!DOCTYPE html>
<html>
<head>
<title>Blood Donor Registration</title>

<style>
body{
    font-family: Arial;
    background-color:#f2f2f2;
    text-align:center;
}

.container{
    background:white;
    width:400px;
    margin:auto;
    padding:20px;
    border-radius:10px;
}

input,select{
    width:90%;
    padding:8px;
    margin:8px;
}

button{
    background:red;
    color:white;
    padding:10px;
    border:none;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>Blood Donation System</h1>

<div class="container">

<h2>Donor Registration Form</h2>

<form>

<input type="text" placeholder="Enter Name" required>

<select>
<option>Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<input type="number" placeholder="Enter Age">

<input type="text" placeholder="Enter Phone Number">

<input type="text" placeholder="Enter City">

<button type="submit">Register Donor</button>

</form>

</div>

</body>
</html>
